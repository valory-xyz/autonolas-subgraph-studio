specVersion: 0.0.8
schema:
  file: ./schema.graphql
# BabyDegen Base (Basius) — Aerodrome-only port of babydegen-optimism.
# Indexing filters by Olas agentId 115 and tracks every Basius service
# (currently 607/610/611/612 on Base); see src/serviceRegistry.ts.
# NOTE: only USDC (native) and ETH flows affect funding metrics; other token
# transfers are tracked for balance only.
#
# startBlock 47163056 = earliest agentId-115 (Basius) service registration
# (service 607, 2026-06-10); nothing relevant exists on Base before it.
dataSources:
  - kind: ethereum
    name: ServiceRegistryL2
    network: base
    source:
      address: "0x3C1fF68f5aa342D296d4DEe4Bb1cACCA912D95fE" # canonical Olas ServiceRegistryL2 on Base
      abi: ServiceRegistryL2
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Service
        - ServiceRegistration
        - ServiceIndex
      abis:
        - name: ServiceRegistryL2
          file: ../../../abis/ServiceRegistryL2.json
      eventHandlers:
        - event: CreateMultisigWithAgents(indexed uint256,indexed address)
          handler: handleCreateMultisigWithAgents
        - event: RegisterInstance(indexed address,indexed uint256,indexed address,uint256)
          handler: handleRegisterInstance
      file: ./src/serviceRegistry.ts

  # ---- Tracked token Transfer sources --------------------------------------
  - kind: ethereum
    name: USDC_Native
    network: base
    source:
      address: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913" # USDC on Base (primary funding/valuation asset)
      abi: ERC20
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FundingBalance
        - TokenBalance
      abis:
        - name: ERC20
          file: ../../../abis/ERC20.json
      eventHandlers:
