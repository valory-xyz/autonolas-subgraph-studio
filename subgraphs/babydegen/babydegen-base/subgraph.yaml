  # ---- Aerodrome Slipstream (CL) positions ---------------------------------
  - kind: ethereum
    name: VeloNFTManager
    network: base
    source:
      address: "0xe1f8cd9AC4e4A65F54f38a5CdAfCA44f6dD68b53" # Aerodrome Slipstream NFPM
      abi: VelodromePositionNFTManager
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtocolPosition
      abis:
        - name: VelodromePositionNFTManager
          file: ../../../abis/nft/VelodromePositionNFTManager.json
        - name: VelodromeCLPool
          file: ../../../abis/defi/VelodromeCLPool.json
        - name: VelodromeCLFactory
          file: ../../../abis/defi/VelodromeCLFactory.json
        - name: VeloCLGauge
          file: ../../../abis/defi/VeloCLGauge.json
        - name: VelodromeV2Pool
          file: ../../../abis/defi/VelodromeV2Pool.json
        - name: AggregatorV3Interface
          file: ../../../abis/oracles/AggregatorV3Interface.json
      eventHandlers:
        - event: IncreaseLiquidity(indexed uint256,uint128,uint256,uint256)
          handler: handleIncreaseLiquidity
        - event: DecreaseLiquidity(indexed uint256,uint128,uint256,uint256)
          handler: handleDecreaseLiquidity
        - event: Collect(indexed uint256,address,uint256,uint256)
          handler: handleCollect
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleNFTTransfer
      file: ./src/veloNFTManager.ts

  # ---- Aerodrome v2 pool discovery / bootstrap (Sugar) ----------------------
  - kind: ethereum/contract
    name: VeloV2Sugar
    network: base
    source:
      address: "0x69dD9db6d8f8E7d83887A704f447b1a584b599A1" # Aerodrome LpSugar v3
      abi: Sugar
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/veloV2Bootstrap.ts
      entities:
        - ProtocolPosition
      abis:
        - name: Sugar
          file: ../../../abis/utils/Sugar.json
        - name: PoolFactory
          file: ../../../abis/defi/PoolFactory.json
        - name: VelodromeV2Pool
          file: ../../../abis/defi/VelodromeV2Pool.json
      blockHandlers:
        - handler: handleVeloV2Bootstrap
          filter:
            kind: once

  - kind: ethereum/contract
    name: VeloV2Factory
    network: base
    source:
      address: "0x420DD381b31aEf6683db6B902084cB0FFECe40Da" # Aerodrome v2 PoolFactory (Divya-confirmed)
      abi: PoolFactory
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/veloV2Bootstrap.ts
      entities:
        - ProtocolPosition
      abis:
        - name: PoolFactory
          file: ../../../abis/defi/PoolFactory.json
        - name: VelodromeV2Pool
          file: ../../../abis/defi/VelodromeV2Pool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed bool,address,uint256)
          handler: handleVeloV2PoolCreated

  # ---- Portfolio snapshot scheduler (block handler) ------------------------
  - kind: ethereum/contract
    name: PortfolioScheduler
    network: base
    source:
      address: "0x3C1fF68f5aa342D296d4DEe4Bb1cACCA912D95fE" # ServiceRegistryL2 address
      abi: ServiceRegistryL2
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentPortfolio
        - AgentPortfolioSnapshot
      abis:
        - name: ServiceRegistryL2
          file: ../../../abis/ServiceRegistryL2.json
        - name: VelodromeV2Pool
          file: ../../../abis/defi/VelodromeV2Pool.json
        - name: VelodromeCLPool
          file: ../../../abis/defi/VelodromeCLPool.json
        - name: VelodromeCLFactory
          file: ../../../abis/defi/VelodromeCLFactory.json
        - name: VelodromePositionNFTManager
          file: ../../../abis/nft/VelodromePositionNFTManager.json
        - name: AggregatorV3Interface
          file: ../../../abis/oracles/AggregatorV3Interface.json
        - name: ERC20
          file: ../../../abis/ERC20.json
        - name: VeloCLGauge
          file: ../../../abis/defi/VeloCLGauge.json
      blockHandlers:
        - handler: handleBlock
          filter:
            kind: polling
            # Base ~2s blocks; 1800 ≈ 1h. Confirmed (Divya): snapshots only fire on
            # UTC-midnight crossings, so a finer interval wouldn't add snapshots.
            every: 1800
      file: ./src/portfolioScheduler.ts

  # ---- LiFi swap tracking (slippage) ---------------------------------------
  - kind: ethereum
    name: LiFiDiamond
    network: base
    source:
      address: "0x1231DEB6f5749EF6cE6943a275A1D3E7486F4EaE" # LiFi Diamond (CREATE2; same on all EVM, confirmed on Base)
      abi: LiFiDiamond
      startBlock: 47163056
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokenBalance
        - SwapTransaction
        - SwapToEntryAssociation
      abis:
        - name: LiFiDiamond
          file: ../../../abis/defi/LiFiDiamond.json
        - name: AggregatorV3Interface
          file: ../../../abis/oracles/AggregatorV3Interface.json
        - name: VelodromeCLPool
          file: ../../../abis/defi/VelodromeCLPool.json
        - name: VelodromeV2Pool
          file: ../../../abis/defi/VelodromeV2Pool.json
      eventHandlers:
        - event: LiFiGenericSwapCompleted(indexed bytes32,string,string,address,address,address,uint256,uint256)
          handler: handleLiFiGenericSwapCompleted
      file: ./src/lifiDiamond.ts

templates:
  # Aerodrome v2 pool template (Mint/Burn/Transfer)
  - kind: ethereum/contract
    name: VeloV2Pool
    network: base
    source:
      abi: VelodromeV2Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtocolPosition
      abis:
        - name: VelodromeV2Pool
          file: ../../../abis/defi/VelodromeV2Pool.json
        - name: AggregatorV3Interface
          file: ../../../abis/oracles/AggregatorV3Interface.json
        - name: VelodromeCLPool
          file: ../../../abis/defi/VelodromeCLPool.json
      eventHandlers:
        - event: Mint(indexed address,uint256,uint256)
          handler: handleVeloV2Mint
        - event: Burn(indexed address,indexed address,uint256,uint256)
          handler: handleVeloV2Burn
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleVeloV2Transfer
      file: ./src/veloV2Pool.ts

  # Safe template for tracking ETH transfers to service / operator safes
  - kind: ethereum/contract
    name: Safe
    network: base
    source:
      abi: Safe
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FundingBalance
        - Service
      abis:
        - name: Safe
          file: ../../../abis/Safe.json
        - name: AggregatorV3Interface
          file: ../../../abis/oracles/AggregatorV3Interface.json
        - name: VelodromeCLPool
          file: ../../../abis/defi/VelodromeCLPool.json
      eventHandlers:
        - event: SafeReceived(indexed address,uint256)
          handler: handleSafeReceived
        - event: ExecutionSuccess(bytes32,uint256)
          handler: handleExecutionSuccess
        - event: ExecutionFromModuleSuccess(indexed address)
          handler: handleExecutionFromModuleSuccess
      file: ./src/safe.ts
