# Balancer V2 pool metrics for OLAS liquidity on L2 chains.
# Each network has one tracked pool. Reserves are fetched via
# vault.getPoolTokens() contract call on BPT mint/burn (join/exit) only.

type PoolMetrics @entity(immutable: false) {
  id: Bytes! # pool (BPT) contract address
  poolId: Bytes! # Balancer V2 pool ID (bytes32)
  token0: Bytes! # first token address
  token1: Bytes! # second token address
  reserve0: BigInt! # first token balance in pool (wei)
  reserve1: BigInt! # second token balance in pool (wei)
  totalSupply: BigInt! # BPT total supply (minted - burned)
  totalMinted: BigInt! # cumulative BPT minted
  totalBurned: BigInt! # cumulative BPT burned
  # Fee tracking (cumulative, in token terms)
  cumulativeFeesToken0: BigInt! # all-time cumulative fees in token0 (wei)
  cumulativeFeesToken1: BigInt! # all-time cumulative fees in token1 (wei)
  swapFeePercentage: BigInt! # cached swap fee % (18 decimals, Balancer; 0 on Celo)

  # Chainlink price (Celo only — CELO/USD from on-chain oracle)
  celoUsdPrice: BigInt! # 8 decimals, 0 on non-Celo chains

  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
  lastUpdatedTransaction: Bytes!
}

# Chainlink price tracker (Celo only)
type PriceData @entity(immutable: false) {
  id: ID! # "celo-usd"
  price: BigInt! # price in 8 decimals from Chainlink
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

# Daily swap fee aggregation
type DailyFees @entity(immutable: false) {
  id: ID! # UTC midnight timestamp string
  dayTimestamp: BigInt! # UTC midnight: timestamp / 86400 * 86400
  totalFeesToken0: BigInt! # daily fees in token0 (wei)
  totalFeesToken1: BigInt! # daily fees in token1 (wei)
  swapCount: Int! # number of swaps this day
}

# Individual BPT transfer event
type BPTTransfer @entity(immutable: true) {
  id: Bytes! # transaction hash + log index
  from: Bytes! # address
  to: Bytes! # address
  value: BigInt! # BPT transferred (wei)
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
