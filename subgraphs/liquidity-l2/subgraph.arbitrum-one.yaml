specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # Balancer V2 Weighted Pool (BPT token)
  # Tracks BPT supply via Transfer events and fetches pool reserves
  # from the Balancer Vault via getPoolTokens() contract call.
  - kind: ethereum/contract
    name: BalancerPool
    network: arbitrum-one
    source:
      address: "0xAF8912a3C4f55a8584B67DF30ee0dDf0e60e01f8"
      abi: BalancerV2WeightedPool
      startBlock: 175754394
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolMetrics
        - BPTTransfer
      abis:
        - name: BalancerV2WeightedPool
          file: ../../abis/BalancerV2WeightedPool.json
        - name: BalancerV2Vault
          file: ../../abis/BalancerV2Vault.json
        - name: UniswapV2Pair
          file: ../../abis/UniswapV2Pair.json
        - name: AggregatorV3Interface
          file: ../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleBPTTransfer
      file: ./src/mapping.ts

  # Balancer V2 Vault — Swap events for fee tracking
  # Processes ALL Vault swaps; handler filters by poolId and skips non-matching.
  - kind: ethereum/contract
    name: BalancerVault
    network: arbitrum-one
    source:
      address: "0xBA12222222228d8Ba445958a75a0704d566BF2C8"
      abi: BalancerV2Vault
      startBlock: 175754394
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - DailyFees
        - PoolMetrics
      abis:
        - name: BalancerV2Vault
          file: ../../abis/BalancerV2Vault.json
        - name: BalancerV2WeightedPool
          file: ../../abis/BalancerV2WeightedPool.json
      eventHandlers:
        - event: Swap(indexed bytes32,indexed address,indexed address,uint256,uint256)
          handler: handleVaultSwap
      file: ./src/mapping.ts
