specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # Celo CELO-OLAS pool is an Ubeswap (UniswapV2) pair, NOT a Balancer V2 pool.
  # Reserves come from Sync events. Supply tracked via Transfer events.
  - kind: ethereum/contract
    name: BalancerPool
    network: celo
    source:
      address: "0x2976Fa805141b467BCBc6334a69AffF4D914d96A"
      abi: UniswapV2Pair
      startBlock: 27100181
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolMetrics
        - BPTTransfer
        - PriceData
      abis:
        - name: BalancerV2WeightedPool
          file: ../../abis/BalancerV2WeightedPool.json
        - name: BalancerV2Vault
          file: ../../abis/BalancerV2Vault.json
        - name: UniswapV2Pair
          file: ../../abis/UniswapV2Pair.json
        - name: AggregatorV3Interface
          file: ../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleBPTTransfer
        - event: Sync(uint112,uint112)
          handler: handleUniswapSync
      file: ./src/mapping.ts
