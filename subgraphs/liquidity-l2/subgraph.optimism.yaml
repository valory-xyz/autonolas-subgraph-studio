specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # Balancer V2 Weighted Pool (BPT token)
  # Tracks BPT supply via Transfer events and fetches pool reserves
  # from the Balancer Vault via getPoolTokens() contract call.
  - kind: ethereum/contract
    name: BalancerPool
    network: optimism
    source:
      address: "0x5bb3e58887264b667f915130fd04bbb56116c278"
      abi: BalancerV2WeightedPool
      startBlock: 117547761
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolMetrics
        - BPTTransfer
      abis:
        - name: BalancerV2WeightedPool
          file: ../../abis/BalancerV2WeightedPool.json
        - name: BalancerV2Vault
          file: ../../abis/BalancerV2Vault.json
        - name: UniswapV2Pair
          file: ../../abis/UniswapV2Pair.json
        - name: AggregatorV3Interface
          file: ../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleBPTTransfer
      file: ./src/mapping.ts
