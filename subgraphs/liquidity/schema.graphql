type LPTransfer @entity(immutable: true) {
  id: Bytes! # transaction hash + log index
  from: Bytes! # address
  to: Bytes! # address
  value: BigInt! # LP tokens transferred (in wei)
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PoolReserves @entity(immutable: false) {
  id: Bytes! # pool contract address
  reserve0: BigInt! # OLAS reserves (in wei)
  reserve1: BigInt! # ETH reserves (in wei)
  lastSyncBlock: BigInt!
  lastSyncTimestamp: BigInt!
  lastSyncTransaction: Bytes!
}

# Treasury LP token holdings tracker
type TreasuryHoldings @entity(immutable: false) {
  id: Bytes! # treasury address
  currentBalance: BigInt! # current LP token balance
  totalAcquired: BigInt! # cumulative acquired
  totalSold: BigInt! # cumulative sold
  firstTransactionTimestamp: BigInt!
  lastTransactionTimestamp: BigInt!
  transactionCount: Int!
}

# Global LP token metrics
type LPTokenMetrics @entity(immutable: false) {
  id: ID! # "global"

  # Supply metrics
  totalSupply: BigInt! # current total LP supply
  totalMinted: BigInt! # cumulative minted
  totalBurned: BigInt! # cumulative burned

  # Treasury metrics
  treasurySupply: BigInt! # LP tokens held by treasury
  treasuryPercentage: BigInt! # treasury % of total (in basis points, 10000 = 100%)

  # Pool metrics
  currentReserve0: BigInt! # current OLAS reserves
  currentReserve1: BigInt! # current ETH reserves

  # USD valuation (from Chainlink oracles on Ethereum mainnet)
  ethUsdPrice: BigInt! # latest ETH/USD price (8 decimals, e.g. 200000000000 = $2000)
  maticUsdPrice: BigInt! # latest MATIC/USD price (8 decimals)
  solUsdPrice: BigInt! # latest SOL/USD price (8 decimals)
  poolLiquidityUsd: BigInt! # total pool value in USD (8 decimals): 2 * ETH_reserves * ETH_price / 1e18
  protocolOwnedLiquidityUsd: BigInt! # treasury's share in USD (8 decimals): poolLiquidityUsd * treasuryPercentage / 10000

  # Timestamps
  lastUpdated: BigInt!
  firstTransferTimestamp: BigInt!
}

# Chainlink price tracker (one entity per feed)
type PriceData @entity(immutable: false) {
  id: ID! # "eth-usd" or "matic-usd"
  price: BigInt! # price in 8 decimals from Chainlink
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

# Bridged LP token holdings in Treasury on Ethereum mainnet
# Each entity tracks Treasury's balance of one bridged LP token
type BridgedPOLHolding @entity(immutable: false) {
  id: Bytes! # bridged LP token address on Ethereum
  originChain: String! # source chain name (gnosis, polygon, solana, etc.)
  pair: String! # trading pair (OLAS-WXDAI, OLAS-WMATIC, etc.)
  currentBalance: BigInt! # Treasury's current balance of this bridged LP token
  totalAcquired: BigInt! # cumulative tokens received by Treasury
  totalSold: BigInt! # cumulative tokens sent from Treasury
  lastTransactionTimestamp: BigInt!
  transactionCount: Int!
}
