specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ──────────────────────────────────────────────────────────────
  # Native OLAS-ETH Uniswap V2 pool on Ethereum mainnet
  # ──────────────────────────────────────────────────────────────

  # LP token Transfer events (mint, burn, treasury movements)
  - kind: ethereum/contract
    name: OLASETHLPToken
    network: mainnet
    source:
      address: "0x09D1d767eDF8Fa23A64C51fa559E0688E526812F"
      abi: ERC20
      startBlock: 17679229
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LPTransfer
        - TreasuryHoldings
        - LPTokenMetrics
      abis:
        - name: ERC20
          file: ../../abis/ERC20Detailed.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleLPTransfer
      file: ./src/mapping.ts

  # Uniswap V2 Pair Sync events (reserve updates + Chainlink price call)
  - kind: ethereum/contract
    name: OLASETHPair
    network: mainnet
    source:
      address: "0x09D1d767eDF8Fa23A64C51fa559E0688E526812F"
      abi: UniswapV2Pair
      startBlock: 17679229
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolReserves
        - LPTokenMetrics
        - PriceData
      abis:
        - name: UniswapV2Pair
          file: ../../abis/UniswapV2Pair.json
        - name: AggregatorV3Interface
          file: ../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/mapping.ts

  # ──────────────────────────────────────────────────────────────
  # Bridged LP tokens held by Treasury on Ethereum mainnet
  # These are ERC-20 tokens representing LP positions from L2/Solana
  # pools, bridged to L1 via OmniBridge or Wormhole Portal.
  # Source: https://github.com/valory-xyz/autonolas-tokenomics/blob/main/docs/lp_token_bridging.md
  # ──────────────────────────────────────────────────────────────

