specVersion: 0.0.5
schema:
  file: ../common/schema.graphql
dataSources:
  # 1. Native tracker (ETH)
  - kind: ethereum
    name: BalanceTrackerFixedPriceNative
    network: arbitrum-one
    source:
      address: "0x26Ea2dC7ce1b41d0AD0E0521535655d7a94b684c"
      abi: BalanceTrackerFixedPriceNative
      startBlock: 430647628
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Global
        - Mech
        - MechModel
        - MechTransaction
        - DailyTotals
        - MechDaily
      abis:
        - name: BalanceTrackerFixedPriceNative
          file: ../../../abis/BalanceTrackerFixedPriceNative.json
        - name: AggregatorV3Interface
          file: ../../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedForNative
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawForNative
      file: ../new-native-mech-fees-arbitrum/src/mapping.ts

  # 2. Token OLAS tracker
  - kind: ethereum
    name: BalanceTrackerFixedPriceTokenOLAS
    network: arbitrum-one
    source:
      address: "0x5dfb0d37f2A28023CDBa46D2f015A90564Cf9586"
      abi: BalanceTrackerFixedPriceToken
      startBlock: 430648244
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Global
        - Mech
        - MechModel
        - MechTransaction
        - DailyTotals
        - MechDaily
      abis:
        - name: BalanceTrackerFixedPriceToken
          file: ../../../abis/BalanceTrackerFixedPriceToken.json
        - name: BalancerV2Vault
          file: ../../../abis/BalancerV2Vault.json
        - name: BalancerV2WeightedPool
          file: ../../../abis/BalancerV2WeightedPool.json
        - name: AggregatorV3Interface
          file: ../../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedForTokenOlas
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawForTokenOlas
      file: ../new-token-olas-mech-fees-arbitrum/src/mapping.ts

  # 3. Token USDC tracker
  - kind: ethereum
    name: BalanceTrackerFixedPriceTokenUSDC
    network: arbitrum-one
    source:
      address: "0xa987Fe40034AaD2EbB0E01B22DFc57f20C87F949"
      abi: BalanceTrackerFixedPriceToken
      startBlock: 430648376
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Global
        - Mech
        - MechModel
        - MechTransaction
        - DailyTotals
        - MechDaily
      abis:
        - name: BalanceTrackerFixedPriceToken
          file: ../../../abis/BalanceTrackerFixedPriceToken.json
      eventHandlers:
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedForTokenUSDC
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawForTokenUSDC
      file: ../new-token-usdc-mech-fees-arbitrum/src/mapping.ts
