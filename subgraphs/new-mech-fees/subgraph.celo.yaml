specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # 1. Native tracker (CELO)
  - kind: ethereum
    name: BalanceTrackerFixedPriceNative
    network: celo
    source:
      address: "0x93111f6C267068A5d7356114D61d0f09bFD53a54"
      abi: BalanceTrackerFixedPriceNative
      startBlock: 61239248
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Global
        - Mech
        - MechModel
        - MechTransaction
        - DailyTotals
        - MechDaily
      abis:
        - name: BalanceTrackerFixedPriceNative
          file: ../../abis/BalanceTrackerFixedPriceNative.json
        - name: AggregatorV3Interface
          file: ../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedForNative
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawForNative
      file: ./src/native-mapping.ts

  # 2. Token OLAS tracker (no pricing pool available yet - USD will be 0)
  - kind: ethereum
    name: BalanceTrackerFixedPriceTokenOLAS
    network: celo
    source:
      address: "0x3912381bAa2935a0fc03c173Df366A459DAc1F43"
      abi: BalanceTrackerFixedPriceToken
      startBlock: 61239248
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Global
        - Mech
        - MechModel
        - MechTransaction
        - DailyTotals
        - MechDaily
      abis:
        - name: BalanceTrackerFixedPriceToken
          file: ../../abis/BalanceTrackerFixedPriceToken.json
        - name: BalancerV2Vault
          file: ../../abis/BalancerV2Vault.json
        - name: BalancerV2WeightedPool
          file: ../../abis/BalancerV2WeightedPool.json
        - name: AggregatorV3Interface
          file: ../../abis/AggregatorV3Interface.json
      eventHandlers:
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedForTokenOlas
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawForTokenOlas
      file: ./src/token-olas-mapping.ts

  # 3. Token USDC tracker
  - kind: ethereum
    name: BalanceTrackerFixedPriceTokenUSDC
    network: celo
    source:
      address: "0xA749f605D93B3efcc207C54270d83C6E8fa70fF8"
      abi: BalanceTrackerFixedPriceToken
      startBlock: 61239248
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Global
        - Mech
        - MechModel
        - MechTransaction
        - DailyTotals
        - MechDaily
      abis:
        - name: BalanceTrackerFixedPriceToken
          file: ../../abis/BalanceTrackerFixedPriceToken.json
      eventHandlers:
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedForTokenUSDC
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawForTokenUSDC
      file: ./src/token-usdc-mapping.ts
