# Minimal service-registration index for every Olas multisig on Polygon.
# Created on ServiceRegistryL2.CreateMultisigWithAgents and enriched by
# RegisterInstance(operator, serviceId, agentInstance, agentId). Used as the
# predicate for lazy TraderAgent creation and the target of cohort-filter
# queries via the `multisig_:` link on TraderAgent.
type Multisig @entity(immutable: false) {
  id: Bytes!                     # multisig address
  serviceId: BigInt!
  agentIds: [Int!]!              # deduplicated; appended on RegisterInstance
  operators: [Bytes!]!           # deduplicated; appended on RegisterInstance
  traderAgent: TraderAgent       # set at lazy creation; null until first trade
  createdAt: BigInt!
  terminatedAt: BigInt           # set by handleTerminateService
  blockNumber: BigInt!
  transactionHash: Bytes!
}

# Internal helper: serviceId -> multisig address lookup, written when
# CreateMultisigWithAgents fires. Used by handleRegisterInstance to locate the
# Multisig entity when RegisterInstance fires after CreateMultisigWithAgents
# (e.g. post-termination re-registration).
type ServiceIndex @entity(immutable: false) {
  id: Bytes!        # bytes(serviceId)
  multisig: Bytes!  # multisig address
}

# Internal helper: buffer for RegisterInstance events that fire before
# CreateMultisigWithAgents (the typical initial-deployment order). Drained
# into the Multisig entity when CreateMultisigWithAgents fires.
type PendingMultisig @entity(immutable: false) {
  id: Bytes!             # bytes(serviceId)
  agentIds: [Int!]!
  operators: [Bytes!]!
}

type TraderAgent @entity (immutable: false) {
  id: Bytes!                      # multisig Safe address
  multisig: Multisig!             # link for cohort-filter queries
  serviceId: BigInt!              # denormalized from multisig.serviceId
  firstParticipation: BigInt
  lastActive: BigInt
  totalBets: Int! # all bets done regardless of settlement
  totalTraded: BigInt!
  # trades amount for settled markets (updated at resolution for ALL bets)
  totalTradedSettled: BigInt!
  totalPayout: BigInt! # actual xUSDC claimed via PayoutRedemption
  totalExpectedPayout: BigInt! # sum of expectedPayouts from settled markets
  bets: [Bet!]! @derivedFrom(field: "bettor")
  dailyProfitStatistics: [DailyProfitStatistic!]! @derivedFrom(field: "traderAgent")
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type QuestionIdToConditionId @entity(immutable: true) {
  id: Bytes!
  oracle: Bytes! # address
  conditionId: Bytes! # bytes32
  transactionHash: Bytes!
}

type Question @entity(immutable: true) {
  id: Bytes! # conditionId
  questionId: Bytes! # bytes32
  isNegRisk: Boolean!
  marketId: Bytes # The grouping ID for Neg Risk
  metadata: MarketMetadata!
  bets: [Bet!]! @derivedFrom(field: "question")
  participants: [MarketParticipant!]! @derivedFrom(field: "question")
  resolution: QuestionResolution @derivedFrom(field: "question")
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MarketMetadata @entity(immutable: true) {
  id: Bytes! # questionId
  title: String!
  outcomes: [String!]!
  rawAncillaryData: String!
}

type Bet @entity (immutable: false) {
  id: Bytes!
  bettor: TraderAgent!
  outcomeIndex: BigInt!
  amount: BigInt!   # USDC spent (positive for buy, negative for sell)
  shares: BigInt!   # Tokens received (positive for buy, negative for sell)
  isBuy: Boolean!   # true for buys, false for sells
  countedInTotal: Boolean!
  countedInProfit: Boolean!
  question: Question
  dailyStatistic: DailyProfitStatistic
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# Maps tokenId to conditionId and outcome index for tracking trades
type TokenRegistry @entity(immutable: true) {
  id: Bytes! # tokenId as string
  tokenId: BigInt!
  conditionId: Bytes!
  outcomeIndex: BigInt! # 0 or 1 for binary markets
  transactionHash: Bytes!
}

# Tracks market finalization when UMA resolves the question
type QuestionResolution @entity (immutable: true) {
  id: Bytes! # conditionId
  question: Question!
  winningIndex: BigInt!
  settledPrice: BigInt!
  payouts: [BigInt!]!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# Tracks per-market statistics for each agent
type MarketParticipant @entity (immutable: false) {
  id: ID! # agentAddress_conditionId
  traderAgent: TraderAgent!
  question: Question
  totalBets: Int!
  totalTraded: BigInt!
  totalTradedSettled: BigInt!
  totalPayout: BigInt!
  outcomeShares0: BigInt! # Net shares of outcome 0 (buys add, sells subtract)
  outcomeShares1: BigInt! # Net shares of outcome 1
  expectedPayout: BigInt! # Calculated at resolution from shares + winning outcome
  settled: Boolean! # Idempotency flag, set true at resolution
  bets: [Bet!]!
  createdAt: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Global @entity (immutable: false) {
  id: ID!
  totalTraderAgents: Int!
  totalActiveTraderAgents: Int!
  totalBets: Int! # all bets including for open markets
  totalPayout: BigInt!
  totalTraded: BigInt!
  totalTradedSettled: BigInt!
  totalExpectedPayout: BigInt! # sum of expectedPayouts from settled markets
  totalMarketsParticipated: Int! # count of unique markets where any agent participated
}

# Distinguishes vanilla ConditionalTokens redemptions from NegRiskAdapter
# redemptions in the PayoutRedemption audit trail.
enum PayoutSource {
  CONDITIONAL_TOKENS
  NEG_RISK_ADAPTER
}

# Immutable log entity for every PayoutRedemption event (debugging/auditing)
type PayoutRedemption @entity(immutable: true) {
  id: Bytes! # txHash + logIndex
  redeemer: TraderAgent!
  conditionId: Bytes!
  question: Question
  payoutAmount: BigInt!
  source: PayoutSource!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type DailyProfitStatistic @entity(immutable: false) {
  id: ID! # traderAgent_address + "_" + day_timestamp
  traderAgent: TraderAgent!
  date: BigInt!

  # Activity placed on this day
  bets: [Bet!]! @derivedFrom(field: "dailyStatistic")
  totalBets: Int! # total Bets placed today
  totalTraded: BigInt! # total traded today, regardless of market settlement
  totalPayout: BigInt! # Payouts received today

  # Profit realized on this day (from settlements/payouts)
  dailyProfit: BigInt!

  # Markets affecting profit on this day
  profitParticipants: [Question!]!
}

# Tracks markets where at least one agent has participated
type MarketParticipated @entity(immutable: true) {
  id: Bytes! # conditionId
}
