specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OLAS
    network: matic
    source:
      address: "0xFEF5d947472e72Efbb2E388c730B7428406F2F95"
      abi: OLAS
      startBlock: 49574787
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - TokenHolder
        - Transfer
      abis:
        - name: OLAS
          file: ../../abis/OLAS.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/olas-l2.ts
